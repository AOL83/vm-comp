<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kerplunk PC Builder – Drag‑and‑Drop Construction with Code Inspection</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a14;
    }
    /* ---- Sidebar Library ---- */
    #sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 260px;
      background: rgba(15, 15, 30, 0.95);
      backdrop-filter: blur(15px);
      border-right: 1px solid rgba(255,255,255,0.15);
      z-index: 40;
      overflow-y: auto;
      padding: 15px;
      color: #ddd;
    }
    .category {
      margin-top: 15px;
      font-weight: bold;
      color: #8ab4f8;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .component-item {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px;
      margin: 6px 0;
      cursor: grab;
      user-select: none;
      transition: 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .component-item:active {
      cursor: grabbing;
      background: rgba(74, 144, 226, 0.3);
    }
    .comp-spec {
      font-size: 0.75rem;
      color: #aaa;
    }
    /* ---- Top status bar ---- */
    #status-bar {
      position: fixed;
      top: 0;
      left: 260px;
      right: 0;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(12px);
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 40;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .stat {
      color: #ccc;
      font-size: 0.9rem;
      margin-right: 25px;
    }
    button {
      background: #4a90e2;
      border: none;
      color: white;
      padding: 6px 18px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:disabled {
      background: #555;
      cursor: default;
    }
    /* ---- Inspector panel (right) ---- */
    #inspector {
      position: fixed;
      right: 20px;
      top: 120px;
      width: 350px;
      background: rgba(15, 15, 30, 0.95);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 20px;
      color: #ddd;
      z-index: 35;
      display: none;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }
    #inspector h3 {
      margin: 0;
      color: #8ab4f8;
    }
    canvas.block-diagram {
      width: 100%;
      height: 130px;
      background: #1a1a2e;
      border-radius: 8px;
    }
    .code-snippet {
      background: #111122;
      border-radius: 8px;
      padding: 10px;
      font-family: monospace;
      font-size: 0.8rem;
    }
    /* ---- Clipping controls ---- */
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 5px 0;
    }
    input[type=range] {
      width: 100px;
    }
  </style>
</head>
<body>
  <!-- Sidebar library -->
  <div id="sidebar">
    <h2 style="margin-top:0;">🧩 Component Library</h2>
    <div class="category">CPU</div>
    <div class="component-item" data-type="cpu" data-model="i5-13600K" data-spec="14C/20T, 3.5GHz, 125W">
      <span>i5-13600K</span><span class="comp-spec">14C/20T</span>
    </div>
    <div class="component-item" data-type="cpu" data-model="Ryzen 7 7800X3D" data-spec="8C/16T, 4.2GHz, 120W">
      <span>Ryzen 7 7800X3D</span><span class="comp-spec">8C/16T</span>
    </div>
    <div class="category">GPU</div>
    <div class="component-item" data-type="gpu" data-model="RTX 4070" data-spec="12GB GDDR6X, 200W">
      <span>RTX 4070</span><span class="comp-spec">12GB</span>
    </div>
    <div class="component-item" data-type="gpu" data-model="RX 7800 XT" data-spec="16GB GDDR6, 263W">
      <span>RX 7800 XT</span><span class="comp-spec">16GB</span>
    </div>
    <div class="category">RAM</div>
    <div class="component-item" data-type="ram" data-model="DDR5-6000 16GB" data-spec="16GB, 1.35V">
      <span>DDR5-6000 16GB</span><span class="comp-spec">16GB</span>
    </div>
    <div class="component-item" data-type="ram" data-model="DDR5-6000 32GB" data-spec="32GB, 1.35V">
      <span>DDR5-6000 32GB</span><span class="comp-spec">32GB</span>
    </div>
    <div class="category">Storage</div>
    <div class="component-item" data-type="storage" data-model="Samsung 990 Pro 1TB" data-spec="NVMe M.2, 1TB">
      <span>990 Pro 1TB</span><span class="comp-spec">1TB NVMe</span>
    </div>
    <div class="category">PSU</div>
    <div class="component-item" data-type="psu" data-model="Corsair RM850x" data-spec="850W, 80+ Gold">
      <span>RM850x</span><span class="comp-spec">850W</span>
    </div>
    <div class="category">Cooler</div>
    <div class="component-item" data-type="cooler" data-model="NH-D15" data-spec="Air, 220W TDP">
      <span>NH-D15</span><span class="comp-spec">Air</span>
    </div>
  </div>

  <!-- Top status -->
  <div id="status-bar">
    <div>
      <span class="stat" id="cpu-stat">🧠 No CPU</span>
      <span class="stat" id="ram-stat">🧮 No RAM</span>
      <span class="stat" id="gpu-stat">🎮 No GPU</span>
      <span class="stat" id="power-stat">⚡ 0W / 0W</span>
    </div>
    <button id="boot-btn" disabled>🔌 Boot System</button>
  </div>

  <!-- Inspector panel -->
  <div id="inspector">
    <button id="close-inspector" style="align-self:flex-end; background:transparent; border:1px solid #aaa; color:#aaa;">✕</button>
    <h3 id="inspector-title">Component</h3>
    <canvas id="block-diagram" class="block-diagram" width="300" height="130"></canvas>
    <div class="code-snippet" id="inspector-code"></div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ---------------- SCENE SETUP ----------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 50);
    camera.position.set(5, 3.5, 6);
    camera.lookAt(0, 0.2, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.15, 0);
    controls.update();
    scene.add(new THREE.AmbientLight(0x404066));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    // ---------------- BUILD WORKBENCH & MOTHERBOARD ----------------
    const desk = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.1, 2.5),
      new THREE.MeshStandardMaterial({ color: 0x3a3a4a, roughness: 0.6 }));
    desk.position.y = -0.55;
    desk.receiveShadow = true;
    scene.add(desk);
    const boardBase = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.08, 1.9),
      new THREE.MeshStandardMaterial({ color: 0x0d2e0d, roughness: 0.7 }));
    boardBase.position.set(0, -0.49, 0);
    boardBase.receiveShadow = true;
    scene.add(boardBase);
    // Traces
    const traceMat = new THREE.LineBasicMaterial({ color: 0xd4af37 });
    for (let i=0;i<30;i++) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3((Math.random()-0.5)*2.2, -0.44, (Math.random()-0.5)*1.7),
        new THREE.Vector3((Math.random()-0.5)*2.2, -0.44, (Math.random()-0.5)*1.7)
      ]);
      scene.add(new THREE.Line(geo, traceMat));
    }

    // Slots (placeholder visuals)
    const slotMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
    function createSlot(w,h,d, x,y,z) {
      const s = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), slotMat);
      s.position.set(x,y,z);
      scene.add(s);
      return s;
    }
    const cpuSocket = createSlot(0.5, 0.05, 0.5, 0, -0.45, 0.2);
    cpuSocket.userData = { type:'cpu' };
    const ramSlots = [-0.6, 0.6].map(x => {
      const s = createSlot(0.12, 0.05, 0.6, x, -0.43, 0.65);
      s.userData = { type:'ram' };
      return s;
    });
    const pcieSlot = createSlot(0.7, 0.05, 0.15, 0.5, -0.45, -0.4);
    pcieSlot.userData = { type:'gpu' };
    const psuBay = createSlot(0.5, 0.15, 0.5, 1.3, -0.45, -0.7);
    psuBay.userData = { type:'psu' };
    const coolerZone = new THREE.Vector3(0, -0.4, 0.2);

    // ---------------- SYSTEM STATE ----------------
    const placedComponents = {
      cpu: null,
      ram: [],
      gpu: null,
      storage: null,
      psu: null,
      cooler: null
    };
    let booted = false;
    let pc = 0, registers = [0,0,0,0], memory = [5,3,0,0,0,0,0,0];
    const program = [
      'LOAD R0, [0]', 'LOAD R1, [1]', 'ADD R0, R1', 'STORE R0, [2]', 'HALT'
    ];

    // 3D objects for placed components
    const placedObjects = new Map();
    const labelGroup = new THREE.Group();
    scene.add(labelGroup);
    function makeLabel(text, pos, color='#fff') {
      const div = document.createElement('div');
      div.textContent = text;
      div.style.color = color;
      div.style.fontSize = '11px';
      div.style.background = 'rgba(0,0,0,0.7)';
      div.style.padding = '2px 6px';
      div.style.borderRadius = '4px';
      const l = new CSS2DObject(div);
      l.position.copy(pos);
      return l;
    }

    // ---------------- DRAG-AND-DROP LOGIC ----------------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const placementPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0.45); // Y = -0.45

    let dragging = null;         // { type, model, spec, mesh }
    let dragGhost = null;

    function getDropSlot(point) {
      const slots = [cpuSocket, ...ramSlots, pcieSlot, psuBay];
      for (const slot of slots) {
        const box = new THREE.Box3().setFromObject(slot);
        if (box.containsPoint(point)) return slot;
      }
      return null;
    }

    function onDragStart(item, e) {
      if (booted) return;
      const type = item.dataset.type;
      const model = item.dataset.model;
      const spec = item.dataset.spec;
      // Create ghost preview
      let geom;
      if (type === 'cpu') geom = new THREE.BoxGeometry(0.45, 0.08, 0.45);
      else if (type === 'gpu') geom = new THREE.BoxGeometry(0.65, 0.08, 1.0);
      else if (type === 'ram') geom = new THREE.BoxGeometry(0.12, 0.2, 0.5);
      else if (type === 'storage') geom = new THREE.BoxGeometry(0.2, 0.05, 0.3);
      else if (type === 'psu') geom = new THREE.BoxGeometry(0.4, 0.12, 0.4);
      else if (type === 'cooler') geom = new THREE.CylinderGeometry(0.25, 0.25, 0.2, 16);
      else return;
      const mat = new THREE.MeshStandardMaterial({ color: 0x4a90e2, transparent: true, opacity: 0.7 });
      dragGhost = new THREE.Mesh(geom, mat);
      dragGhost.castShadow = true;
      scene.add(dragGhost);
      dragging = { type, model, spec, ghost: dragGhost };
      document.body.style.cursor = 'grabbing';
      e.preventDefault();
    }

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const target = new THREE.Vector3();
      raycaster.ray.intersectPlane(placementPlane, target);
      if (target) {
        dragging.ghost.position.copy(target);
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      const slot = getDropSlot(dragging.ghost.position);
      if (slot && slot.userData.type === dragging.type) {
        placeComponent(dragging.type, dragging.model, dragging.spec, dragging.ghost.position.clone(), slot);
      }
      scene.remove(dragging.ghost);
      dragging = null;
      dragGhost = null;
      document.body.style.cursor = '';
    });

    function placeComponent(type, model, spec, pos, slot) {
      // Remove previous if slot occupied
      if (type === 'cpu' && placedComponents.cpu) return;
      if (type === 'gpu' && placedComponents.gpu) return;
      if (type === 'psu' && placedComponents.psu) return;
      if (type === 'ram' && placedComponents.ram.length >= 2) return;
      if (type === 'storage' && placedComponents.storage) return;
      if (type === 'cooler' && placedComponents.cooler) return;

      const color = type==='cpu'?0x1a1a3a:type==='gpu'?0x2a2a40:type==='ram'?0x2e6b2e:type==='psu'?0x444466:type==='storage'?0x666666:0x888888;
      let geom;
      if (type==='cpu') geom = new THREE.BoxGeometry(0.45,0.08,0.45);
      else if (type==='gpu') geom = new THREE.BoxGeometry(0.65,0.08,1.0);
      else if (type==='ram') geom = new THREE.BoxGeometry(0.12,0.2,0.5);
      else if (type==='storage') geom = new THREE.BoxGeometry(0.2,0.05,0.3);
      else if (type==='psu') geom = new THREE.BoxGeometry(0.4,0.12,0.4);
      else if (type==='cooler') geom = new THREE.CylinderGeometry(0.25,0.25,0.2,16);
      const compMesh = new THREE.Mesh(geom, new THREE.MeshStandardMaterial({ color, roughness:0.4 }));
      compMesh.position.copy(pos);
      compMesh.userData = { type, model, spec };
      scene.add(compMesh);

      if (type==='ram') placedComponents.ram.push({ model, spec, mesh: compMesh });
      else placedComponents[type] = { model, spec, mesh: compMesh };
      placedObjects.set(compMesh, { type, model, spec });
      updateStats();
    }

    // ---------------- STATISTICS UPDATE ----------------
    function updateStats() {
      const cpu = placedComponents.cpu;
      const gpu = placedComponents.gpu;
      const ramCount = placedComponents.ram.length;
      document.getElementById('cpu-stat').textContent = cpu ? `🧠 ${cpu.model}` : '🧠 No CPU';
      document.getElementById('ram-stat').textContent = ramCount>0 ? `🧮 ${ramCount} stick(s)` : '🧮 No RAM';
      document.getElementById('gpu-stat').textContent = gpu ? `🎮 ${gpu.model}` : '🎮 No GPU';
      let power = 0;
      if (cpu) power += parseInt(cpu.spec.match(/(\d+)W/)?.[1] || 100);
      if (gpu) power += parseInt(gpu.spec.match(/(\d+)W/)?.[1] || 100);
      document.getElementById('power-stat').textContent = `⚡ ${power}W / 850W`;
      const bootBtn = document.getElementById('boot-btn');
      bootBtn.disabled = !(cpu && ramCount > 0);
    }

    // ---------------- BOOT & CODE EXECUTION ----------------
    const packetGeom = new THREE.SphereGeometry(0.05, 8, 8);
    const packetMat = new THREE.MeshBasicMaterial({ color: 0x44aaff });
    const packet = new THREE.Mesh(packetGeom, packetMat);
    packet.visible = false;
    scene.add(packet);

    function animatePacket(from, to, cb) {
      packet.visible = true;
      packet.position.copy(from);
      const dur = 500, start = performance.now();
      const startPos = from.clone();
      function tick(now) {
        const t = Math.min((now-start)/dur,1);
        packet.position.lerpVectors(startPos, to, t);
        if (t<1) requestAnimationFrame(tick);
        else { packet.visible = false; if(cb) cb(); }
      }
      requestAnimationFrame(tick);
    }

    function step() {
      if (!booted || pc>=program.length) return;
      if (pc===0) animatePacket(new THREE.Vector3(-0.6,-0.35,0.65), new THREE.Vector3(0,-0.35,0.2), ()=>{registers[0]=5; pc++; step();});
      else if (pc===1) animatePacket(new THREE.Vector3(0.6,-0.35,0.65), new THREE.Vector3(0,-0.35,0.2), ()=>{registers[1]=3; pc++; step();});
      else if (pc===2) { registers[0]+=registers[1]; pc++; step(); }
      else if (pc===3) { memory[2]=registers[0]; pc++; step(); }
      else if (pc===4) { booted=false; }
    }

    document.getElementById('boot-btn').addEventListener('click', ()=>{
      if (booted) return;
      booted = true;
      pc=0; registers=[0,0,0,0]; memory=[5,3,0,0,0,0,0,0];
      step();
    });

    // ---------------- COMPONENT CLICK INSPECTOR ----------------
    const inspector = document.getElementById('inspector');
    const inspTitle = document.getElementById('inspector-title');
    const inspCanvas = document.getElementById('block-diagram');
    const inspCode = document.getElementById('inspector-code');
    document.getElementById('close-inspector').onclick = ()=> inspector.style.display='none';

    renderer.domElement.addEventListener('click', (e) => {
      mouse.x = (e.clientX / window.innerWidth)*2-1;
      mouse.y = -(e.clientY / window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(scene.children, true);
      for (let hit of hits) {
        let obj = hit.object;
        while (obj && !obj.userData.type) obj = obj.parent;
        if (obj && obj.userData.type) {
          const {type, model, spec} = obj.userData;
          inspTitle.textContent = `${model} (${type.toUpperCase()})`;
          const ctx = inspCanvas.getContext('2d');
          ctx.clearRect(0,0,300,130);
          ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,300,130);
          ctx.fillStyle='white';
          if (type==='cpu') {
            ctx.fillText('Fetch → Decode → Execute → Writeback', 20,40);
            ctx.fillText(`ALU, 14 cores`,20,80);
            inspCode.innerHTML = `<span class="highlight">ADD R0, R1</span> ; currently executing<br>MOV R2, R0`;
          } else if (type==='gpu') {
            ctx.fillText('Shader Cores, TMU, ROP',20,40);
            inspCode.innerHTML = `gl_Position = uMVPMatrix * vec4(aPosition,1.0);`;
          } else if (type==='ram') {
            ctx.fillText('DRAM Cell Array',20,40);
            inspCode.innerHTML = `int* ptr = malloc(64);<br>ptr[0] = 5;`;
          } else {
            ctx.fillText('Component internals',20,40);
            inspCode.textContent = '; code interfacing this hardware';
          }
          inspector.style.display='flex';
          return;
        }
      }
    });

    // ---------------- FINAL ANIMATION LOOP ----------------
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', ()=>{
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Hook drag start on sidebar items
    document.querySelectorAll('.component-item').forEach(item => {
      item.addEventListener('mousedown', (e) => onDragStart(item, e));
    });

    // Prevent actual text selection during drag
    window.ondragstart = (e) => e.preventDefault();
  </script>
</body>
</html>
