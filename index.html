<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Production-Grade PC Inspection Bench – Proper PCB Routing, Code-to-Pin Mapping</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a14;
    }
    /* ---- Top toolbar ---- */
    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 45px;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 20px;
      z-index: 40;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
    }
    button {
      background: #4a90e2;
      border: none;
      color: white;
      padding: 5px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      background: #555;
      cursor: default;
    }
    input[type=range] {
      width: 90px;
    }
    /* Inspector panel */
    #inspector {
      position: fixed;
      right: 20px;
      top: 100px;
      width: 360px;
      background: rgba(15, 15, 30, 0.95);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 20px;
      color: #ddd;
      z-index: 35;
      display: none;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }
    #inspector h3 { margin:0; color:#8ab4f8; }
    canvas.pin-diagram {
      width: 100%;
      height: 160px;
      background: #0d0d20;
      border-radius: 8px;
    }
    .code-snippet {
      background: #111122;
      padding: 10px;
      font-family: monospace;
      font-size: 0.8rem;
    }
    .highlight { background: #4a90e2; color: white; }
    /* Clipping plane indicator */
    #clip-info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #aaa;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.6);
      padding: 5px 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="tool-group">
      <span>🔍 Case Opacity</span>
      <input type="range" id="opacity-slider" min="0" max="100" value="100">
    </div>
    <div class="tool-group">
      <button id="clip-toggle">🧠 Clip Plane OFF</button>
      <input type="range" id="clip-slider" min="-1.5" max="1.5" value="0" step="0.01" disabled>
    </div>
    <button id="reset-view">↺ Reset View</button>
  </div>
  <div id="inspector">
    <button id="close-inspector" style="align-self:flex-end; background:transparent; border:1px solid #aaa; color:#aaa;">✕</button>
    <h3 id="inspector-title">Component</h3>
    <canvas id="pin-diagram" class="pin-diagram" width="320" height="160"></canvas>
    <div class="code-snippet" id="inspector-code"></div>
    <button id="step-btn" disabled>▶ Step Instruction</button>
    <div style="font-size:0.8rem; color:#aaa;" id="exec-status"></div>
  </div>
  <div id="clip-info">Clip plane at Z = 0.0</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ---------------- REAL PCB MODEL ----------------
    // We'll define a realistic motherboard with known pin positions and routes.
    // All coordinates in mm, scaled to world units (1 unit = 10 mm for visibility).
    const scale = 0.1; // 1 unit = 10mm, so motherboard ~ 24cm x 19cm -> 2.4x1.9 units
    const boardWidth = 2.4, boardHeight = 1.9;
    const boardThickness = 0.08;

    // Pin definitions (world coordinates, relative to board center)
    // CPU socket: 4x4 grid of pads (LGA-like)
    const cpuPins = [];
    for (let i=-1.5; i<=1.5; i+=1) {
      for (let j=-0.3; j<=0.9; j+=0.6) {
        cpuPins.push({ pos: new THREE.Vector3(i*0.15, -0.44, j*0.15+0.2), label: `CPU_P${cpuPins.length}` });
      }
    }
    // RAM slot pins (two slots)
    const ram0Pins = [];
    for (let k=0; k<12; k++) {
      ram0Pins.push({ pos: new THREE.Vector3(-0.7 + k*0.03, -0.44, 0.65), label: `RAM0_${k}` });
    }
    const ram1Pins = [];
    for (let k=0; k<12; k++) {
      ram1Pins.push({ pos: new THREE.Vector3(0.7 - k*0.03, -0.44, 0.65), label: `RAM1_${k}` });
    }
    // PCIe slot pins
    const pciePins = [];
    for (let m=0; m<16; m++) {
      pciePins.push({ pos: new THREE.Vector3(0.5, -0.44, -0.4 + m*0.04), label: `PCIE_${m}` });
    }

    // Routing rules: we'll precompute trace segments connecting specific pins.
    // For demonstration, connect CPU memory bus to RAM slots and PCIe.
    const routes = [
      { from: cpuPins[0].pos, to: ram0Pins[0].pos, signal: 'DQ0' },
      { from: cpuPins[1].pos, to: ram0Pins[1].pos, signal: 'DQ1' },
      { from: cpuPins[2].pos, to: ram0Pins[2].pos, signal: 'DQ2' },
      { from: cpuPins[3].pos, to: ram1Pins[0].pos, signal: 'DQ3' },
      { from: cpuPins[4].pos, to: pciePins[0].pos, signal: 'TX0' },
      { from: cpuPins[5].pos, to: pciePins[1].pos, signal: 'TX1' },
    ];

    // Generate realistic-looking trace geometry with 45° corners and via markers
    function createTrace(start, end, color = 0xd4af37) {
      const points = [];
      const sx = start.x, sy = start.y, sz = start.z;
      const ex = end.x, ey = end.y, ez = end.z;
      // Simple manhattan routing: first move in X, then Z (or vice versa) with a via at corner
      points.push(new THREE.Vector3(sx, sy, sz));
      const midY = sy;
      if (Math.abs(sx - ex) > 0.01) {
        points.push(new THREE.Vector3(ex, midY, sz)); // horizontal segment
      }
      points.push(new THREE.Vector3(ex, ey, ez));
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color }));
      // Add a small via cylinder at the corner if there is a bend
      if (points.length === 3) {
        const via = new THREE.Mesh(
          new THREE.CylinderGeometry(0.02, 0.02, 0.05, 6),
          new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3 })
        );
        via.position.copy(points[1]);
        via.position.y -= 0.025;
        return { line, via };
      }
      return { line, via: null };
    }

    // ---------------- SCENE SETUP ----------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.Fog(0x0a0a14, 5, 25);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 50);
    camera.position.set(3.5, 2.5, 4.5);
    camera.lookAt(0, 0.1, 0.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.localClippingEnabled = true; // essential for clip plane
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.1, 0.2);
    controls.update();

    // Lighting
    scene.add(new THREE.AmbientLight(0x404066));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    scene.add(dirLight);

    // Clipping plane for surgical slicing
    const clippingPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0);
    const clipPlanes = [clippingPlane];

    // ---------------- BUILD THE BOARD ----------------
    // Glass case (with opacity control)
    const caseMat = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      roughness: 0.1,
      metalness: 0.1,
      transparent: true,
      opacity: 1.0,
      clearcoat: 0.5,
      clippingPlanes: clipPlanes,
      clipShadows: true,
    });
    const caseLeft = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.4, 1.9), caseMat);
    caseLeft.position.set(-1.3, 0.1, 0.1);
    const caseRight = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.4, 1.9), caseMat);
    caseRight.position.set(1.3, 0.1, 0.1);
    const caseTop = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.1, 1.9), caseMat);
    caseTop.position.set(0, 0.8, 0.1);
    scene.add(caseLeft, caseRight, caseTop);

    // Motherboard base
    const boardMat = new THREE.MeshStandardMaterial({
      color: 0x0d2e0d,
      roughness: 0.7,
      clippingPlanes: clipPlanes,
    });
    const board = new THREE.Mesh(new THREE.BoxGeometry(boardWidth, boardThickness, boardHeight), boardMat);
    board.position.set(0, -0.5, 0.1);
    board.receiveShadow = true;
    scene.add(board);

    // Draw all traces
    routes.forEach(route => {
      const { line, via } = createTrace(route.from, route.to, 0xd4af37);
      line.material.clippingPlanes = clipPlanes;
      scene.add(line);
      if (via) {
        via.material.clippingPlanes = clipPlanes;
        scene.add(via);
      }
    });

    // Component placeholders with realistic shapes and pad arrays
    function createPad(x,y,z) {
      const pad = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.02,6),
        new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness:0.2, clippingPlanes: clipPlanes }));
      pad.position.set(x,y,z);
      return pad;
    }
    // CPU chip (with visible pads)
    const cpuGroup = new THREE.Group();
    const cpuBody = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x1a1a3a, roughness:0.3, clippingPlanes: clipPlanes }));
    cpuBody.position.set(0, -0.42, 0.2);
    cpuBody.userData = { component: 'cpu', name: 'Intel i5-13600K' };
    cpuGroup.add(cpuBody);
    // CPU pads
    cpuPins.forEach(pin => {
      cpuGroup.add(createPad(pin.pos.x, -0.44, pin.pos.z));
    });
    scene.add(cpuGroup);

    // RAM sticks
    const ramGroup0 = new THREE.Group();
    const stick0 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x2e6b2e, roughness:0.5, clippingPlanes: clipPlanes }));
    stick0.position.set(-0.7, -0.35, 0.65);
    stick0.userData = { component: 'ram', name: 'DDR5-6000 16GB' };
    ramGroup0.add(stick0);
    ram0Pins.forEach(pin => ramGroup0.add(createPad(pin.pos.x, -0.44, pin.pos.z)));
    scene.add(ramGroup0);

    const ramGroup1 = new THREE.Group();
    const stick1 = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x2e6b2e, roughness:0.5, clippingPlanes: clipPlanes }));
    stick1.position.set(0.7, -0.35, 0.65);
    stick1.userData = { component: 'ram', name: 'DDR5-6000 16GB' };
    ramGroup1.add(stick1);
    ram1Pins.forEach(pin => ramGroup1.add(createPad(pin.pos.x, -0.44, pin.pos.z)));
    scene.add(ramGroup1);

    // GPU card (simplified board with fan)
    const gpuGroup = new THREE.Group();
    const gpuBoard = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.08, 0.9),
      new THREE.MeshStandardMaterial({ color: 0x2a2a40, roughness:0.4, clippingPlanes: clipPlanes }));
    gpuBoard.position.set(0.5, -0.42, -0.2);
    gpuBoard.userData = { component: 'gpu', name: 'RTX 4070' };
    gpuGroup.add(gpuBoard);
    pciePins.forEach(pin => gpuGroup.add(createPad(pin.pos.x, -0.44, pin.pos.z)));
    scene.add(gpuGroup);

    // ---------------- CLIP PLANE UI ----------------
    const clipToggle = document.getElementById('clip-toggle');
    const clipSlider = document.getElementById('clip-slider');
    const clipInfo = document.getElementById('clip-info');
    let clipActive = false;
    clipToggle.addEventListener('click', () => {
      clipActive = !clipActive;
      clipToggle.textContent = clipActive ? '🧠 Clip Plane ON' : '🧠 Clip Plane OFF';
      clipSlider.disabled = !clipActive;
      if (!clipActive) {
        clippingPlane.constant = 0;
        clipSlider.value = 0;
        clipInfo.textContent = 'Clip plane at Z = 0.0';
      }
    });
    clipSlider.addEventListener('input', () => {
      clippingPlane.constant = parseFloat(clipSlider.value);
      clipInfo.textContent = `Clip plane at Z = ${clippingPlane.constant.toFixed(2)}`;
    });

    // Case opacity
    const opacitySlider = document.getElementById('opacity-slider');
    opacitySlider.addEventListener('input', () => {
      caseMat.opacity = parseInt(opacitySlider.value) / 100;
    });

    // Reset view
    document.getElementById('reset-view').addEventListener('click', () => {
      camera.position.set(3.5, 2.5, 4.5);
      controls.target.set(0, 0.1, 0.2);
      controls.update();
    });

    // ---------------- COMPONENT INSPECTOR & CODE EXECUTION ----------------
    const inspector = document.getElementById('inspector');
    const inspTitle = document.getElementById('inspector-title');
    const pinCanvas = document.getElementById('pin-diagram');
    const inspCode = document.getElementById('inspector-code');
    const stepBtn = document.getElementById('step-btn');
    const execStatus = document.getElementById('exec-status');
    let selectedComponent = null;
    let execState = { pc: 0, registers: [0,0,0,0], memory: [5,3,0,0,0,0,0,0] };

    // Raycaster for component selection
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    renderer.domElement.addEventListener('click', (e) => {
      mouse.x = (e.clientX / window.innerWidth)*2-1;
      mouse.y = -(e.clientY / window.innerHeight)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(scene.children, true);
      for (let hit of hits) {
        let obj = hit.object;
        while (obj && !obj.userData.component) obj = obj.parent;
        if (obj && obj.userData.component) {
          selectedComponent = obj;
          const { component, name } = obj.userData;
          inspTitle.textContent = `${name} (${component.toUpperCase()})`;
          // Draw internal block diagram
          const ctx = pinCanvas.getContext('2d');
          ctx.clearRect(0,0,320,160);
          ctx.fillStyle='#0d0d20'; ctx.fillRect(0,0,320,160);
          if (component==='cpu') {
            ctx.fillStyle='white';
            ctx.fillText('Fetch → Decode → Execute → Writeback',20,40);
            ctx.fillText('Memory Controller linked to traces DQ0-DQ3',20,80);
            inspCode.innerHTML = `<span class="highlight">LOAD R0, [0x1000]</span>  ; Reads from RAM via DQ0`;
            stepBtn.disabled = false;
            execState.pc = 0;
          } else if (component==='ram') {
            ctx.fillText('DRAM Cell Array (8Gb)',20,40);
            ctx.fillText('Pins DQ0-DQ11 mapped to CPU bus',20,80);
            inspCode.textContent = '; Data stored at address 0x1000 = 5';
            stepBtn.disabled = true;
          } else if (component==='gpu') {
            ctx.fillText('Shader Cores, ROPs, TMUs',20,40);
            inspCode.textContent = 'gl_Position = uMVPMatrix * aPosition;';
            stepBtn.disabled = true;
          }
          inspector.style.display='flex';
          return;
        }
      }
    });

    document.getElementById('close-inspector').onclick = ()=> inspector.style.display='none';

    // Step execution for CPU visualization (lights up a trace)
    const packetGeom = new THREE.SphereGeometry(0.03, 6,6);
    const packetMat = new THREE.MeshBasicMaterial({ color: 0x44aaff });
    const packet = new THREE.Mesh(packetGeom, packetMat);
    packet.visible = false;
    scene.add(packet);

    function animatePacket(from, to, callback) {
      packet.visible = true;
      packet.position.copy(from);
      const dur = 600, start = performance.now();
      const startPos = from.clone();
      function tick(now) {
        const t = Math.min((now-start)/dur,1);
        packet.position.lerpVectors(startPos, to, t);
        if (t<1) requestAnimationFrame(tick);
        else { packet.visible=false; if(callback) callback(); }
      }
      requestAnimationFrame(tick);
    }

    stepBtn.addEventListener('click', ()=>{
      if (!selectedComponent || selectedComponent.userData.component!=='cpu') return;
      const state = execState;
      const instructions = [
        { type:'LOAD', reg:0, addr:0, from: ram0Pins[0].pos, to: cpuPins[0].pos },
        { type:'LOAD', reg:1, addr:1, from: ram1Pins[0].pos, to: cpuPins[3].pos },
        { type:'ADD', reg:0, reg2:1 },
        { type:'STORE', reg:0, addr:2 },
        { type:'HALT' }
      ];
      if (state.pc >= instructions.length) {
        execStatus.textContent = 'Program halted.';
        return;
      }
      const instr = instructions[state.pc];
      if (instr.type==='LOAD' || instr.type==='STORE') {
        const from = instr.from.clone();
        const to = instr.to.clone();
        animatePacket(from, to, ()=>{
          if (instr.type==='LOAD') state.registers[instr.reg] = state.memory[instr.addr];
          else state.memory[instr.addr] = state.registers[instr.reg];
          state.pc++;
          execStatus.textContent = `Executed: ${instr.type} (R${instr.reg} = ${state.registers[instr.reg]})`;
          stepBtn.click(); // chain? Not, but manually step again.
        });
      } else if (instr.type==='ADD') {
        state.registers[instr.reg] += state.registers[instr.reg2];
        state.pc++;
        execStatus.textContent = `ADD R${instr.reg} = ${state.registers[instr.reg]}`;
      } else {
        state.pc++;
        execStatus.textContent = 'HALT';
      }
    });

    // ---------------- ANIMATION LOOP ----------------
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', ()=>{
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
