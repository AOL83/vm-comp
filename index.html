<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stickman PC – Visual Hardware with Live Code Inspection</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a14;
    }
    /* Navbar */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.8rem 1.5rem;
      z-index: 20;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .nav-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #ccc;
      padding: 0.6rem 1.8rem;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
      color: #fff;
    }
    .nav-btn.active {
      background: #4a90e2;
      border-color: #4a90e2;
      color: white;
      box-shadow: 0 0 15px #4a90e2aa;
    }
    /* Code panel – hidden by default, shown in Metaphysical view */
    #code-panel {
      position: fixed;
      right: 25px;
      top: 120px;
      width: 320px;
      background: rgba(15, 15, 30, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 20px;
      color: #ddd;
      font-size: 0.9rem;
      z-index: 15;
      display: none;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    }
    #code-panel h3 {
      margin: 0 0 5px 0;
      color: #8ab4f8;
      font-weight: 600;
    }
    .program-listing {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
    }
    .instr {
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .instr.active {
      background: #4a90e2;
      color: white;
      font-weight: bold;
    }
    .registers {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .reg {
      background: #2a2a3e;
      border-radius: 6px;
      padding: 4px 12px;
      font-family: monospace;
    }
    button {
      background: #4a90e2;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 6px;
      transition: 0.2s;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background: #6aa8ff;
    }
    #info-panel {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      color: #ccc;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      max-width: 340px;
      font-size: 0.9rem;
      border-left: 4px solid #4a90e2;
      transition: opacity 0.3s;
      z-index: 15;
    }
    @media (max-width: 700px) {
      #navbar { gap: 0.5rem; padding: 0.5rem; }
      .nav-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
      #code-panel { width: 260px; right: 10px; }
    }
  </style>
</head>
<body>
  <div id="navbar">
    <button id="btn-skin" class="nav-btn active">Skin</button>
    <button id="btn-framework" class="nav-btn">Framework</button>
    <button id="btn-metaphysical" class="nav-btn">Metaphysical (Code)</button>
    <button id="btn-overview" class="nav-btn">System Overview</button>
  </div>

  <div id="code-panel">
    <h3>🧠 CPU Execution</h3>
    <div class="program-listing" id="program-text"></div>
    <div class="registers" id="registers-display"></div>
    <div style="display:flex; gap:6px; margin-top:6px;">
      <button id="step-btn">Step</button>
      <button id="run-btn">▶ Run</button>
      <button id="reset-btn">↺ Reset</button>
    </div>
    <div style="font-size:0.8rem; color:#aaa;" id="status-msg">Ready. Program: compute 5 + 3</div>
  </div>

  <div id="info-panel">
    <strong>Skin (Case)</strong><br>
    Outer enclosure. Protects and houses all components.
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // -------------------- SCENE SETUP --------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.Fog(0x0a0a14, 5, 25);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 50);
    camera.position.set(5, 3.5, 7);
    camera.lookAt(0, 0.2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.15, 0);
    controls.update();

    // Lights
    scene.add(new THREE.AmbientLight(0x404066));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.receiveShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);
    scene.add(new THREE.PointLight(0x335577, 0.8));

    // Groups
    const skinGroup = new THREE.Group();
    const frameworkGroup = new THREE.Group();
    const metaGroup = new THREE.Group(); // for execution visuals
    const allComponents = new THREE.Group();
    scene.add(skinGroup, frameworkGroup, metaGroup, allComponents);

    // -------------------- BUILD 3D MODEL --------------------
    // Chassis (always visible base)
    const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.4, 2.0),
      new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.6, metalness: 0.4 }));
    chassis.position.y = 0;
    chassis.castShadow = chassis.receiveShadow = true;
    allComponents.add(chassis);
    const frontPanel = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.2, 0.1),
      new THREE.MeshStandardMaterial({ color: 0x1e1e2e, roughness: 0.3, metalness: 0.7 }));
    frontPanel.position.set(0, 0, 1.0);
    allComponents.add(frontPanel);

    // SKIN (case panels)
    const panelMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4a, roughness: 0.25, metalness: 0.8, transparent: true, opacity: 0.9 });
    const leftPanel = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.3, 1.9), panelMat);
    leftPanel.position.set(-1.15, 0.05, 0);
    skinGroup.add(leftPanel);
    const rightPanel = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.3, 1.9), panelMat);
    rightPanel.position.set(1.15, 0.05, 0);
    skinGroup.add(rightPanel);
    const topPanel = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.1, 1.9), panelMat);
    topPanel.position.set(0, 0.75, 0);
    skinGroup.add(topPanel);
    const frontCover = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.2, 0.05),
      new THREE.MeshStandardMaterial({ color: 0x4a4a5a, roughness: 0.2, metalness: 0.9 }));
    frontCover.position.set(0, 0, 1.05);
    skinGroup.add(frontCover);

    // FRAMEWORK (motherboard + components)
    const board = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.08, 1.6),
      new THREE.MeshStandardMaterial({ color: 0x1a472a, roughness: 0.7, metalness: 0.2 }));
    board.position.set(0, -0.3, -0.1);
    frameworkGroup.add(board);
    const cpu = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.5),
      new THREE.MeshStandardMaterial({ color: 0xc0c0e0, roughness: 0.2, metalness: 0.9, emissive: new THREE.Color(0x111133) }));
    cpu.position.set(0, -0.2, 0.2);
    frameworkGroup.add(cpu);
    const gpu = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 1.1),
      new THREE.MeshStandardMaterial({ color: 0x2a2a40, roughness: 0.3, metalness: 0.8 }));
    gpu.position.set(0.5, -0.45, -0.1);
    gpu.rotation.x = -0.1;
    frameworkGroup.add(gpu);
    for (let i = -0.6; i <= 0.6; i+=1.2) {
      const ramStick = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.25, 0.06),
        new THREE.MeshStandardMaterial({ color: 0x2e6b2e, roughness: 0.5, metalness: 0.3 }));
      ramStick.position.set(i, -0.15, 0.65);
      frameworkGroup.add(ramStick);
    }
    const cooler = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.25, 0.55),
      new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.4, metalness: 0.7 }));
    cooler.position.set(0, -0.05, 0.2);
    frameworkGroup.add(cooler);

    // Labels for components
    function createLabel(text, pos, color='#fff') {
      const div = document.createElement('div');
      div.textContent = text;
      div.style.color = color;
      div.style.fontWeight = 'bold';
      div.style.background = 'rgba(20,20,30,0.8)';
      div.style.padding = '2px 8px';
      div.style.borderRadius = '4px';
      const lbl = new CSS2DObject(div);
      lbl.position.copy(pos);
      return lbl;
    }
    const labelGroup = new THREE.Group();
    labelGroup.add(createLabel('CPU', new THREE.Vector3(0, 0.1, 0.2), '#aaccff'));
    labelGroup.add(createLabel('GPU', new THREE.Vector3(0.5, -0.3, -0.1), '#ccaa88'));
    labelGroup.add(createLabel('RAM', new THREE.Vector3(-0.6, 0.0, 0.75), '#88cc88'));
    frameworkGroup.add(labelGroup);

    // MEMORY VISUALIZATION (8 cells near RAM)
    const memCells = [];
    const memValues = [5, 3, 0, 0, 0, 0, 0, 0]; // initial program data
    const cellGroup = new THREE.Group();
    for (let i = 0; i < 8; i++) {
      const cellGeo = new THREE.BoxGeometry(0.12, 0.05, 0.12);
      const cellMat = new THREE.MeshStandardMaterial({ color: 0x335533, roughness: 0.6 });
      const cell = new THREE.Mesh(cellGeo, cellMat);
      cell.position.set(-0.7 + i * 0.2, 0.05, 0.82);
      cell.userData = { address: i };
      cellGroup.add(cell);
      // value label
      const valDiv = document.createElement('div');
      valDiv.style.color = '#cfc';
      valDiv.style.fontSize = '10px';
      valDiv.style.background = 'rgba(0,0,0,0.7)';
      valDiv.style.padding = '1px 4px';
      const valLabel = new CSS2DObject(valDiv);
      valLabel.position.copy(cell.position.clone().add(new THREE.Vector3(0, 0.1, 0)));
      cellGroup.add(valLabel);
      memCells.push({ mesh: cell, label: valLabel, value: memValues[i] });
    }
    metaGroup.add(cellGroup);

    // CPU register visual labels (CSS2D objects near CPU)
    const regLabels = [];
    const regNames = ['R0', 'R1', 'R2', 'R3'];
    const regPositions = [
      new THREE.Vector3(-0.2, 0.05, 0.5),
      new THREE.Vector3(0.2, 0.05, 0.5),
      new THREE.Vector3(-0.2, -0.1, 0.5),
      new THREE.Vector3(0.2, -0.1, 0.5)
    ];
    regNames.forEach((name, idx) => {
      const div = document.createElement('div');
      div.style.color = '#aad';
      div.style.fontWeight = 'bold';
      div.style.background = 'rgba(0,0,30,0.8)';
      div.style.padding = '2px 6px';
      div.style.borderRadius = '4px';
      div.textContent = `${name}: 0`;
      const lbl = new CSS2DObject(div);
      lbl.position.copy(regPositions[idx]);
      metaGroup.add(lbl);
      regLabels.push({ name, label: lbl, value: 0 });
    });

    // Animated packet (glowing sphere)
    const packetGeo = new THREE.SphereGeometry(0.07, 16, 16);
    const packetMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.9 });
    const packet = new THREE.Mesh(packetGeo, packetMat);
    packet.visible = false;
    metaGroup.add(packet);

    // -------------------- CPU SIMULATOR --------------------
    const program = [
      { instr: 'LOAD', args: [0, 0], desc: 'R0 ← mem[0]', text: 'LOAD R0, [0]' },
      { instr: 'LOAD', args: [1, 1], desc: 'R1 ← mem[1]', text: 'LOAD R1, [1]' },
      { instr: 'ADD',  args: [0, 1], desc: 'R0 ← R0 + R1', text: 'ADD R0, R1' },
      { instr: 'STORE',args: [0, 2], desc: 'mem[2] ← R0', text: 'STORE R0, [2]' },
      { instr: 'HALT', args: [], desc: 'Stop', text: 'HALT' }
    ];
    let registers = [0, 0, 0, 0];
    let memory = [5, 3, 0, 0, 0, 0, 0, 0];
    let pc = 0;
    let halted = false;
    let animating = false;

    // Update visual memory cells and register labels
    function updateMemoryVisuals() {
      memCells.forEach((cell, i) => {
        cell.value = memory[i];
        cell.label.element.textContent = memory[i];
        cell.mesh.material.color.set(memory[i] !== 0 ? 0x44aa44 : 0x335533);
      });
    }
    function updateRegisterVisuals() {
      regLabels.forEach((reg, i) => {
        reg.value = registers[i];
        reg.label.element.textContent = `${reg.name}: ${registers[i]}`;
      });
    }
    function updatePanel() {
      const listing = document.getElementById('program-text');
      listing.innerHTML = program.map((p, idx) => 
        `<div class="instr${idx === pc ? ' active' : ''}">${p.text}</div>`
      ).join('');
      document.getElementById('registers-display').innerHTML = 
        registers.map((v,i) => `<span class="reg">R${i}: ${v}</span>`).join('');
      document.getElementById('status-msg').textContent = halted ? 'Program halted.' : 'Ready.';
    }

    function resetCPU() {
      pc = 0;
      halted = false;
      registers = [0,0,0,0];
      memory = [5,3,0,0,0,0,0,0];
      updateMemoryVisuals();
      updateRegisterVisuals();
      updatePanel();
      packet.visible = false;
    }

    // Animation helpers
    function animatePacket(from, to, duration, onComplete) {
      if (animating) return;
      animating = true;
      packet.visible = true;
      packet.position.copy(from);
      const startTime = performance.now();
      const startPos = from.clone();
      function tick(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1.0);
        packet.position.lerpVectors(startPos, to, t);
        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          packet.visible = false;
          animating = false;
          if (onComplete) onComplete();
        }
      }
      requestAnimationFrame(tick);
    }

    function stepExecution() {
      if (animating || halted) return;
      const instr = program[pc];
      if (!instr) return;

      if (instr.instr === 'LOAD') {
        const [regIdx, addr] = instr.args;
        const srcCell = memCells[addr].mesh;
        const fromPos = srcCell.position.clone();
        const toPos = regPositions[regIdx].clone();
        animatePacket(fromPos, toPos, 600, () => {
          registers[regIdx] = memory[addr];
          updateRegisterVisuals();
          pc++;
          updatePanel();
          if (pc >= program.length || program[pc].instr === 'HALT') {
            halted = true;
            updatePanel();
          }
        });
      } else if (instr.instr === 'ADD') {
        const [r1, r2] = instr.args;
        registers[r1] += registers[r2];
        updateRegisterVisuals();
        pc++;
        updatePanel();
        if (pc >= program.length || program[pc].instr === 'HALT') halted = true;
      } else if (instr.instr === 'STORE') {
        const [regIdx, addr] = instr.args;
        const fromPos = regPositions[regIdx].clone();
        const toCell = memCells[addr].mesh;
        const toPos = toCell.position.clone();
        animatePacket(fromPos, toPos, 600, () => {
          memory[addr] = registers[regIdx];
          updateMemoryVisuals();
          pc++;
          updatePanel();
          if (pc >= program.length || program[pc].instr === 'HALT') halted = true;
        });
      } else if (instr.instr === 'HALT') {
        halted = true;
        updatePanel();
      }
    }

    // UI controls
    document.getElementById('step-btn').addEventListener('click', stepExecution);
    let autoRunInterval = null;
    document.getElementById('run-btn').addEventListener('click', () => {
      if (autoRunInterval) {
        clearInterval(autoRunInterval);
        autoRunInterval = null;
        document.getElementById('run-btn').textContent = '▶ Run';
        return;
      }
      document.getElementById('run-btn').textContent = '⏸ Pause';
      autoRunInterval = setInterval(() => {
        if (halted || animating) {
          if (halted) {
            clearInterval(autoRunInterval);
            autoRunInterval = null;
            document.getElementById('run-btn').textContent = '▶ Run';
          }
          return;
        }
        stepExecution();
      }, 800);
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (autoRunInterval) {
        clearInterval(autoRunInterval);
        autoRunInterval = null;
        document.getElementById('run-btn').textContent = '▶ Run';
      }
      resetCPU();
    });

    // Initialize visual state
    updateMemoryVisuals();
    updateRegisterVisuals();
    updatePanel();

    // -------------------- LAYER SWITCHING --------------------
    const codePanel = document.getElementById('code-panel');
    const infoPanel = document.getElementById('info-panel');

    function setLayer(layer) {
      skinGroup.visible = false;
      frameworkGroup.visible = false;
      metaGroup.visible = false;
      codePanel.style.display = 'none';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

      switch(layer) {
        case 'skin':
          skinGroup.visible = true;
          document.getElementById('btn-skin').classList.add('active');
          infoPanel.innerHTML = `<strong>Skin (Case)</strong><br>Outer shell. Protects internals.`;
          animateCamera(new THREE.Vector3(4, 2.5, 5), new THREE.Vector3(0, 0.1, 0));
          break;
        case 'framework':
          frameworkGroup.visible = true;
          document.getElementById('btn-framework').classList.add('active');
          infoPanel.innerHTML = `<strong>Framework</strong><br>Motherboard, CPU, GPU, RAM. The skeleton.`;
          animateCamera(new THREE.Vector3(1.5, 1.8, 2.8), new THREE.Vector3(0, -0.2, 0.2));
          break;
        case 'metaphysical':
          frameworkGroup.visible = true;
          metaGroup.visible = true;
          codePanel.style.display = 'flex';
          document.getElementById('btn-metaphysical').classList.add('active');
          infoPanel.innerHTML = `<strong>Metaphysical (Code Execution)</strong><br>Watch instructions flow. The stickman’s invisible rules become visible.`;
          animateCamera(new THREE.Vector3(0.4, 0.7, 1.8), new THREE.Vector3(0, -0.1, 0.3));
          break;
        case 'overview':
          skinGroup.visible = true;
          frameworkGroup.visible = true;
          metaGroup.visible = true;
          codePanel.style.display = 'none';
          document.getElementById('btn-overview').classList.add('active');
          infoPanel.innerHTML = `<strong>System Overview</strong><br>Unified hardware + code. A complete computer.`;
          animateCamera(new THREE.Vector3(5, 3.5, 6), new THREE.Vector3(0, 0.2, 0));
          break;
      }
    }

    function animateCamera(targetPos, targetLook) {
      const startPos = camera.position.clone();
      const startLook = controls.target.clone();
      const startTime = performance.now();
      const duration = 800;
      function update(now) {
        const t = Math.min((now - startTime) / duration, 1.0);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        camera.position.lerpVectors(startPos, targetPos, ease);
        controls.target.lerpVectors(startLook, targetLook, ease);
        controls.update();
        if (t < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    document.getElementById('btn-skin').onclick = () => setLayer('skin');
    document.getElementById('btn-framework').onclick = () => setLayer('framework');
    document.getElementById('btn-metaphysical').onclick = () => setLayer('metaphysical');
    document.getElementById('btn-overview').onclick = () => setLayer('overview');

    setLayer('skin'); // start

    // -------------------- ANIMATION LOOP --------------------
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
