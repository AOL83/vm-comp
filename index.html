<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ReverseLab – Visual Product Reverse Engineering Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a14; overflow: hidden; }
    /* Layout grid */
    #app {
      display: grid;
      grid-template-rows: 48px 1fr 40px;
      grid-template-columns: 260px 1fr 360px;
      height: 100vh;
    }
    #command-bar {
      grid-column: 1 / -1;
      background: rgba(12, 12, 25, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      z-index: 50;
    }
    .cmd-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #ccc;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
      text-transform: uppercase;
      font-size: 0.8rem;
    }
    .cmd-btn:hover { background: rgba(255,255,255,0.15); }
    .cmd-btn.active { background: #4a90e2; border-color: #4a90e2; color: white; }
    .cmd-btn:disabled { opacity: 0.4; cursor: default; }

    #product-library {
      background: rgba(15, 15, 30, 0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto;
      padding: 15px;
      color: #ddd;
      z-index: 40;
    }
    .library-category {
      font-weight: bold;
      color: #8ab4f8;
      margin: 15px 0 6px;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }
    .library-item {
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px 12px;
      margin: 4px 0;
      cursor: grab;
      user-select: none;
      transition: 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .library-item:active { cursor: grabbing; }
    .library-item.dragging-source { opacity: 0.3; }

    #workspace {
      position: relative;
      background: radial-gradient(circle at center, #1c1c2e 0%, #0a0a14 80%);
      overflow: hidden;
    }
    #workspace canvas { display: block; }

    #inspector-panel {
      background: rgba(15, 15, 30, 0.95);
      backdrop-filter: blur(15px);
      border-left: 1px solid rgba(255,255,255,0.15);
      color: #ddd;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      z-index: 40;
      transition: transform 0.3s;
    }
    #inspector-panel.hidden { transform: translateX(360px); }
    .inspector-tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
    }
    .inspector-tab {
      background: none;
      border: none;
      color: #aaa;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 500;
    }
    .inspector-tab.active { background: #4a90e2; color: white; }
    .inspector-content { flex: 1; overflow-y: auto; }

    #console {
      grid-column: 1 / -1;
      background: #0d0d18;
      border-top: 1px solid rgba(255,255,255,0.1);
      color: #8a8a9a;
      padding: 6px 20px;
      font-family: monospace;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 20px;
      overflow-x: auto;
    }
    .log-entry { white-space: nowrap; }
    .log-time { color: #4a90e2; margin-right: 8px; }

    /* Drag ghost */
    .drag-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.9;
      background: #4a90e2;
      color: white;
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Command Bar -->
  <div id="command-bar">
    <button class="cmd-btn" id="mode-inspect">🔍 Inspect</button>
    <button class="cmd-btn" id="mode-move">✋ Move</button>
    <button class="cmd-btn" id="mode-connect">🔗 Connect</button>
    <button class="cmd-btn" id="mode-explode">💥 Explode</button>
    <button class="cmd-btn" id="import-manual">📄 Import Manual</button>
    <button class="cmd-btn" id="undo-btn" disabled>↩ Undo</button>
    <button class="cmd-btn" id="redo-btn" disabled>↪ Redo</button>
  </div>

  <!-- Product Library -->
  <div id="product-library">
    <h3 style="margin-bottom:10px;">📦 Catalogue</h3>
    <div class="library-category">Systems</div>
    <div class="library-item" data-type="raspberrypi" data-name="Raspberry Pi 4">Raspberry Pi 4</div>
    <div class="library-item" data-type="drill" data-name="Electric Drill">Electric Drill</div>
    <div class="library-category">Electronics</div>
    <div class="library-item" data-type="motor" data-name="DC Motor">DC Motor 12V</div>
    <div class="library-item" data-type="battery" data-name="Li-ion Pack">Li-ion Battery</div>
    <div class="library-category">Mechanical</div>
    <div class="library-item" data-type="gearbox" data-name="Planetary Gearbox">Planetary Gearbox</div>
    <div class="library-item" data-type="frame" data-name="Drone Frame">Drone Frame</div>
  </div>

  <!-- 3D Workspace -->
  <div id="workspace"></div>

  <!-- Inspector Panel -->
  <div id="inspector-panel" class="hidden">
    <div style="display:flex; justify-content:space-between;">
      <strong id="inspector-title">Select a component</strong>
      <button style="background:none;border:none;color:#aaa;cursor:pointer;" id="close-inspector">✕</button>
    </div>
    <div class="inspector-tabs">
      <button class="inspector-tab active" data-tab="overview">Overview</button>
      <button class="inspector-tab" data-tab="parts">Parts</button>
      <button class="inspector-tab" data-tab="connections">Connections</button>
      <button class="inspector-tab" data-tab="specs">Specs</button>
      <button class="inspector-tab" data-tab="upgrades">Upgrades</button>
    </div>
    <div class="inspector-content" id="inspector-content"></div>
  </div>

  <!-- Console -->
  <div id="console">
    <span style="color:#4a90e2; font-weight:bold;">LOG:</span>
    <span id="log-container"></span>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ---------- APPLICATION STATE ----------
  const state = {
    mode: 'inspect',       // inspect | move | connect | explode
    objects: [],           // placed 3D objects { id, mesh, product, position }
    selectedId: null,
    history: [],
    historyIndex: -1,
    log: []
  };

  // ---------- 3D SCENE SETUP ----------
  const workspace = document.getElementById('workspace');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0c0c18);
  const camera = new THREE.PerspectiveCamera(45, workspace.clientWidth / workspace.clientHeight, 0.5, 50);
  camera.position.set(5, 3, 6);
  camera.lookAt(0, 0, 0);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(workspace.clientWidth, workspace.clientHeight);
  renderer.shadowMap.enabled = true;
  workspace.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0, 0.5, 0);
  controls.update();

  // Lighting
  scene.add(new THREE.AmbientLight(0x404066));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(5, 8, 5);
  dirLight.castShadow = true;
  dirLight.receiveShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);
  // Ground plane for reference
  const grid = new THREE.GridHelper(6, 20, 0x333355, 0x222233);
  scene.add(grid);

  // ---------- PRODUCT MODELS & DATA ----------
  const productDatabase = {
    raspberrypi: {
      name: 'Raspberry Pi 4',
      parts: ['SoC (Broadcom BCM2711)', 'RAM (4GB LPDDR4)', 'USB-C Power', 'GPIO Header', 'HDMI', 'Ethernet'],
      connections: ['Power -> SoC', 'SoC -> RAM', 'GPIO -> external'],
      specs: { voltage: '5V', current: '3A', cores: '4x ARM Cortex-A72' },
      upgrades: ['8GB RAM kit', 'Heatsink', 'NVMe HAT'],
      model: (group) => {
        const board = new THREE.BoxGeometry(0.85, 0.1, 0.55);
        const mesh = new THREE.Mesh(board, new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.7 }));
        mesh.position.y = 0.05;
        group.add(mesh);
        // SoC chip
        const soc = new THREE.BoxGeometry(0.2, 0.06, 0.2);
        const socMesh = new THREE.Mesh(soc, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 }));
        socMesh.position.set(0.1, 0.08, 0.1);
        group.add(socMesh);
        // GPIO pins
        for (let i=0; i<12; i++) {
          const pin = new THREE.CylinderGeometry(0.02,0.02,0.1,6);
          const pinMesh = new THREE.Mesh(pin, new THREE.MeshStandardMaterial({ color: 0xcccccc }));
          pinMesh.position.set(-0.35 + i*0.06, 0.1, 0.2);
          group.add(pinMesh);
        }
      }
    },
    motor: {
      name: 'DC Motor 12V',
      parts: ['Rotor', 'Stator', 'Commutator', 'Brushes', 'Shaft'],
      connections: ['Battery -> Brushes -> Commutator -> Rotor'],
      specs: { voltage: '12V', rpm: '3000', torque: '0.5 Nm' },
      upgrades: ['Brushless motor', 'Encoder'],
      model: (group) => {
        const body = new THREE.CylinderGeometry(0.15, 0.15, 0.4, 16);
        const mesh = new THREE.Mesh(body, new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.5 }));
        mesh.position.y = 0.2;
        group.add(mesh);
        const shaft = new THREE.CylinderGeometry(0.03, 0.03, 0.25, 8);
        const shaftMesh = new THREE.Mesh(shaft, new THREE.MeshStandardMaterial({ color: 0xcccccc }));
        shaftMesh.position.y = 0.45;
        group.add(shaftMesh);
      }
    },
    battery: {
      name: 'Li-ion Battery Pack',
      parts: ['Cells (3x18650)', 'BMS', 'Connector'],
      connections: ['Cells -> BMS -> Connector'],
      specs: { voltage: '11.1V', capacity: '3000mAh' },
      upgrades: ['Higher capacity cells', 'Fast charging BMS'],
      model: (group) => {
        const box = new THREE.BoxGeometry(0.3, 0.2, 0.15);
        const mesh = new THREE.Mesh(box, new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.6 }));
        group.add(mesh);
      }
    },
    gearbox: {
      name: 'Planetary Gearbox',
      parts: ['Sun gear', 'Planet gears (3)', 'Ring gear', 'Carrier'],
      connections: ['Motor shaft -> Sun gear -> Planets -> Carrier'],
      specs: { ratio: '5:1', material: 'Steel' },
      upgrades: ['Metal gears', 'Lubrication'],
      model: (group) => {
        const ring = new THREE.TorusGeometry(0.18, 0.05, 8, 16);
        const mesh = new THREE.Mesh(ring, new THREE.MeshStandardMaterial({ color: 0x888888 }));
        mesh.position.y = 0.15;
        group.add(mesh);
      }
    },
    drill: {
      name: 'Electric Drill',
      parts: ['Motor', 'Battery', 'Trigger', 'Gearbox', 'Chuck'],
      connections: ['Battery -> Trigger -> Motor -> Gearbox -> Chuck'],
      specs: { voltage: '18V', rpm: '1500' },
      upgrades: ['Brushless motor', 'Lithium battery'],
      model: (group) => {
        const body = new THREE.BoxGeometry(0.3, 0.25, 0.6);
        const mesh = new THREE.Mesh(body, new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.5 }));
        group.add(mesh);
        const handle = new THREE.BoxGeometry(0.15, 0.4, 0.2);
        const handleMesh = new THREE.Mesh(handle, new THREE.MeshStandardMaterial({ color: 0x222222 }));
        handleMesh.position.set(0, -0.3, 0.1);
        group.add(handleMesh);
      }
    },
    frame: {
      name: 'Drone Frame',
      parts: ['Arms (4)', 'Center plate', 'Landing gear'],
      connections: ['Arms -> Center plate'],
      specs: { material: 'Carbon fiber', weight: '250g' },
      upgrades: ['Titanium screws', 'Longer arms'],
      model: (group) => {
        const center = new THREE.BoxGeometry(0.4, 0.1, 0.4);
        group.add(new THREE.Mesh(center, new THREE.MeshStandardMaterial({ color: 0x444444 })));
        for (let i=0; i<4; i++) {
          const arm = new THREE.BoxGeometry(0.8, 0.05, 0.05);
          const armMesh = new THREE.Mesh(arm, new THREE.MeshStandardMaterial({ color: 0x222222 }));
          armMesh.position.x = Math.cos(i*Math.PI/2)*0.4;
          armMesh.position.z = Math.sin(i*Math.PI/2)*0.4;
          armMesh.rotation.y = i*Math.PI/2;
          group.add(armMesh);
        }
      }
    }
  };

  // ---------- OBJECT PLACEMENT ----------
  let nextId = 1;
  function addObjectToScene(type, position) {
    if (!productDatabase[type]) return;
    const product = productDatabase[type];
    const group = new THREE.Group();
    product.model(group);
    group.position.copy(position);
    group.userData = { id: nextId, type, product };
    scene.add(group);
    const obj = { id: nextId, mesh: group, product: { ...product, type }, position: position.clone() };
    state.objects.push(obj);
    nextId++;
    addLog(`Placed ${product.name} at (${position.x.toFixed(1)}, ${position.y.toFixed(1)}, ${position.z.toFixed(1)})`);
    saveHistory();
    return obj;
  }

  // ---------- HISTORY (UNDO/REDO) ----------
  function saveHistory() {
    const snapshot = JSON.stringify(state.objects.map(o => ({ id: o.id, type: o.product.type, pos: [o.position.x, o.position.y, o.position.z] })));
    if (state.historyIndex < state.history.length - 1) {
      state.history = state.history.slice(0, state.historyIndex + 1);
    }
    state.history.push(snapshot);
    state.historyIndex++;
    updateUndoRedo();
  }
  function undo() {
    if (state.historyIndex <= 0) return;
    state.historyIndex--;
    restoreSnapshot(state.history[state.historyIndex]);
    updateUndoRedo();
  }
  function redo() {
    if (state.historyIndex >= state.history.length - 1) return;
    state.historyIndex++;
    restoreSnapshot(state.history[state.historyIndex]);
    updateUndoRedo();
  }
  function restoreSnapshot(snapshotStr) {
    const data = JSON.parse(snapshotStr);
    // Clear existing objects
    state.objects.forEach(obj => scene.remove(obj.mesh));
    state.objects = [];
    data.forEach(item => {
      const pos = new THREE.Vector3(item.pos[0], item.pos[1], item.pos[2]);
      addObjectToScene(item.type, pos);
    });
  }
  function updateUndoRedo() {
    document.getElementById('undo-btn').disabled = state.historyIndex <= 0;
    document.getElementById('redo-btn').disabled = state.historyIndex >= state.history.length - 1;
  }

  // ---------- LOGGING ----------
  function addLog(message) {
    const time = new Date().toLocaleTimeString();
    state.log.push({ time, message });
    renderLog();
  }
  function renderLog() {
    const container = document.getElementById('log-container');
    container.innerHTML = state.log.slice(-5).map(l => `<span class="log-entry"><span class="log-time">${l.time}</span> ${l.message}</span>`).join(' ');
  }

  // ---------- DRAG AND DROP FROM LIBRARY ----------
  const libraryItems = document.querySelectorAll('.library-item');
  let draggedType = null;
  let draggedName = null;
  let ghostEl = null;

  libraryItems.forEach(item => {
    item.addEventListener('dragstart', (e) => {
      draggedType = item.dataset.type;
      draggedName = item.dataset.name;
      e.dataTransfer.setData('text/plain', draggedType);
      item.classList.add('dragging-source');
      // Create custom ghost
      ghostEl = document.createElement('div');
      ghostEl.className = 'drag-ghost';
      ghostEl.textContent = draggedName;
      document.body.appendChild(ghostEl);
      e.dataTransfer.setDragImage(ghostEl, 50, 20);
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging-source');
      if (ghostEl) { document.body.removeChild(ghostEl); ghostEl = null; }
      draggedType = null;
    });
  });

  workspace.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });

  workspace.addEventListener('drop', (e) => {
    e.preventDefault();
    if (!draggedType) return;
    const rect = renderer.domElement.getBoundingClientRect();
    const mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(mouseX, mouseY);
    raycaster.setFromCamera(mouse, camera);
    // Intersect with a ground plane at y=0
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const point = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, point);
    if (point) {
      const obj = addObjectToScene(draggedType, point);
      addLog(`Dragged ${draggedName} into workspace.`);
    }
  });

  // ---------- INSPECTOR LOGIC ----------
  const inspectorPanel = document.getElementById('inspector-panel');
  const inspTitle = document.getElementById('inspector-title');
  const inspContent = document.getElementById('inspector-content');
  const closeInspector = document.getElementById('close-inspector');
  const inspectorTabs = document.querySelectorAll('.inspector-tab');
  let activeTab = 'overview';
  let inspectedObj = null;

  function showInspector(obj) {
    inspectedObj = obj;
    inspectorPanel.classList.remove('hidden');
    inspTitle.textContent = obj.product.name;
    activeTab = 'overview';
    document.querySelectorAll('.inspector-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.inspector-tab[data-tab="overview"]').classList.add('active');
    renderInspectorContent();
  }
  function renderInspectorContent() {
    if (!inspectedObj) return;
    const prod = inspectedObj.product;
    let html = '';
    switch (activeTab) {
      case 'overview':
        html = `<p><strong>Type:</strong> ${prod.type}</p><p>${prod.specs && Object.entries(prod.specs).map(([k,v])=>`<strong>${k}:</strong> ${v}`).join('<br>')}</p>`;
        break;
      case 'parts':
        html = `<ul>${prod.parts.map(p => `<li>${p}</li>`).join('')}</ul>`;
        break;
      case 'connections':
        html = `<ul>${prod.connections.map(c => `<li>${c}</li>`).join('')}</ul>`;
        break;
      case 'specs':
        html = `<pre>${JSON.stringify(prod.specs, null, 2)}</pre>`;
        break;
      case 'upgrades':
        html = `<ul>${prod.upgrades.map(u => `<li>✅ ${u}</li>`).join('')}</ul>`;
        break;
    }
    inspContent.innerHTML = html;
  }
  inspectorTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      activeTab = tab.dataset.tab;
      document.querySelectorAll('.inspector-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderInspectorContent();
    });
  });
  closeInspector.addEventListener('click', () => {
    inspectorPanel.classList.add('hidden');
    inspectedObj = null;
  });

  // ---------- CLICK SELECTION IN WORKSPACE ----------
  renderer.domElement.addEventListener('click', (e) => {
    if (e.detail > 1) return; // ignore double
    const rect = renderer.domElement.getBoundingClientRect();
    const mouse = new THREE.Vector2(
      ((e.clientX - rect.left) / rect.width) * 2 - 1,
      -((e.clientY - rect.top) / rect.height) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(state.objects.map(o => o.mesh), true);
    if (intersects.length > 0) {
      let obj = intersects[0].object;
      while (obj && !obj.userData.id) obj = obj.parent;
      if (obj && obj.userData.id) {
        const found = state.objects.find(o => o.id === obj.userData.id);
        if (found) {
          showInspector(found);
          addLog(`Inspecting ${found.product.name}`);
        }
      }
    }
  });

  // ---------- MODE SWITCHING ----------
  const modeButtons = {
    inspect: document.getElementById('mode-inspect'),
    move: document.getElementById('mode-move'),
    connect: document.getElementById('mode-connect'),
    explode: document.getElementById('mode-explode')
  };
  function setMode(mode) {
    state.mode = mode;
    Object.keys(modeButtons).forEach(m => modeButtons[m].classList.remove('active'));
    modeButtons[mode].classList.add('active');
    controls.enableRotate = mode !== 'connect'; // simple example
    addLog(`Mode: ${mode}`);
  }
  modeButtons.inspect.addEventListener('click', () => setMode('inspect'));
  modeButtons.move.addEventListener('click', () => setMode('move'));
  modeButtons.connect.addEventListener('click', () => setMode('connect'));
  modeButtons.explode.addEventListener('click', () => setMode('explode'));
  setMode('inspect');

  // ---------- IMPORT MANUAL (FAKE) ----------
  document.getElementById('import-manual').addEventListener('click', () => {
    addLog('Importing manual for Electric Drill...');
    // Simulate extraction and build
    const pos = new THREE.Vector3(1, 0, 1);
    const drill = addObjectToScene('drill', pos);
    addLog('AI extracted parts: Motor, Battery, Trigger, Gearbox, Chuck');
    addLog('Built digital twin of Electric Drill.');
    showInspector(drill);
  });

  // ---------- UNDO/REDO BUTTONS ----------
  document.getElementById('undo-btn').addEventListener('click', undo);
  document.getElementById('redo-btn').addEventListener('click', redo);

  // ---------- ANIMATION LOOP ----------
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // Resize handler
  window.addEventListener('resize', () => {
    camera.aspect = workspace.clientWidth / workspace.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(workspace.clientWidth, workspace.clientHeight);
  });

  // Initial history snapshot
  saveHistory();
  addLog('ReverseLab ready. Drag components from library or import a manual.');
</script>
</body>
</html>
